<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enable FIX_OUTPUT</title>
    <style>
        body { font-family: Arial; padding: 20px; text-align: center; }
        button { font-size: 24px; padding: 20px 40px; margin: 20px; background: #ff6600; color: white; border: none; border-radius: 10px; }
        button:disabled { background: #ccc; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        .warning { color: orange; }
        table { margin: 20px auto; border-collapse: collapse; }
        td, th { border: 1px solid #ccc; padding: 8px; text-align: left; }
        input[type="number"] { width: 60px; font-size: 16px; }
    </style>
</head>
<body>
    <h1>Enable FIX_OUTPUT</h1>
    <p class="warning"><b>Warning:</b> This locks the lamp to fixed brightness!</p>
    
    <h3>Settings to modify:</h3>
    <table>
        <tr><th>Parameter</th><th>New Value</th></tr>
        <tr style="background:#ffe0e0"><td><b>FIX_OUTPUT</b></td><td><b>ENABLED (1)</b></td></tr>
        <tr style="background:#ffe0e0"><td><b>Brightness Fix</b></td><td><input type="number" id="fixBrightness" value="100" min="0" max="100">%</td></tr>
    </table>
    <p><i>All other settings will be preserved from the lamp's current configuration.</i></p>
    
    <button onclick="readAndPrepare()" id="btnRead">1. Read Current Config</button>
    <button onclick="writeNFC()" id="btnWrite" disabled>2. Write Changes</button>
    
    <p id="status"></p>
    <pre id="debug" style="text-align:left; background:#f0f0f0; padding:10px; margin:20px; font-size:11px; max-height:400px; overflow:auto;"></pre>

    <script>
    let currentParams = {};  // Store parsed parameters by type: {t01: {num: val}, t02: {num: val}}
    let rawUrlData = '';  // Store raw URL for reference
    
    async function readAndPrepare() {
        const status = document.getElementById('status');
        const debug = document.getElementById('debug');
        const btnWrite = document.getElementById('btnWrite');
        debug.textContent = '';
        btnWrite.disabled = true;
        currentParams = {};
        rawUrlData = '';
        
        if (!('NDEFReader' in window)) {
            status.innerHTML = '<span class="error">Web NFC not supported. Use Chrome on Android.</span>';
            return;
        }

        try {
            status.innerHTML = '<span class="info">Hold phone to lamp NFC to READ current config...</span>';
            const ndef = new NDEFReader();
            const controller = new AbortController();
            
            await ndef.scan({ signal: controller.signal });
            
            ndef.onreading = event => {
                controller.abort();
                const decoder = new TextDecoder();
                
                for (const record of event.message.records) {
                    if (record.data) {
                        const text = decoder.decode(record.data);
                        rawUrlData = text;
                        debug.textContent = 'Read ' + text.length + ' bytes\n\n';
                        
                        // Parse ALL parameters (t01, t02, etc)
                        const allMatches = text.matchAll(/t([0-9a-f]{2})n([0-9a-f]{2})v([0-9a-f]{8})x/gi);
                        for (const match of allMatches) {
                            const type = match[1].toLowerCase();
                            const num = match[2].toLowerCase();
                            const val = match[3].toLowerCase();
                            if (!currentParams[type]) currentParams[type] = {};
                            currentParams[type][num] = val;
                        }
                        
                        // Display t01 params if any
                        if (currentParams['01']) {
                            debug.textContent += 'Found t01 (device) parameters: ' + Object.keys(currentParams['01']).length + '\n';
                        }
                        
                        // Display t02 params  
                        debug.textContent += '\nCurrent t02 (setting) parameters:\n';
                        const t02 = currentParams['02'] || {};
                        
                        for (const num of Object.keys(t02).sort()) {
                            const val = t02[num];
                            
                            // Decode known params for display
                            const intVal = parseInt(val, 16);
                            let name = 'n' + num;
                            if (num === '01') name = 'Holdtime Main';
                            else if (num === '02') name = 'Holdtime Base';
                            else if (num === '03') name = 'Brightness Main';
                            else if (num === '04') name = 'Brightness Base';
                            else if (num === '05') name = 'Brightness Standby';
                            else if (num === '06') name = 'Brightness Fix';
                            else if (num === '07') name = 'Standby Mode';
                            else if (num === '09') name = 'Rise Time';
                            else if (num === '0a') name = 'Fall Time';
                            else if (num === '0b') name = 'FIX_OUTPUT';
                            else if (num === '0c') name = 'Radar Sensitivity';
                            else if (num === '11') name = 'Daylight Control';
                            
                            debug.textContent += `  ${name} (n${num}): ${val} = ${intVal}\n`;
                        }
                        
                        const t02Params = currentParams['02'] || {};
                        debug.textContent += '\nFound ' + Object.keys(t02Params).length + ' t02 parameters.\n';
                        
                        // Show current values
                        if (t02Params['0b']) {
                            const fixVal = parseInt(t02Params['0b'], 16);
                            debug.textContent += '\nCurrent FIX_OUTPUT: ' + (fixVal === 0 ? 'DISABLED' : 'ENABLED') + '\n';
                        }
                        if (t02Params['06']) {
                            const fixBright = parseInt(t02Params['06'], 16);
                            debug.textContent += 'Current Brightness Fix: ' + fixBright + '%\n';
                            document.getElementById('fixBrightness').value = fixBright;
                        }
                        
                        debug.textContent += '\n✓ Ready to write. Click "Write Changes" button.\n';
                        btnWrite.disabled = false;
                        status.innerHTML = '<span class="success">✓ Config read. Now UNPLUG lamp, then click "Write Changes".</span>';
                    }
                }
            };
            
            ndef.onreadingerror = () => {
                status.innerHTML = '<span class="error">Error reading NFC tag</span>';
            };
            
        } catch (error) {
            status.innerHTML = '<span class="error">Error: ' + error.message + '</span>';
        }
    }

    async function writeNFC() {
        const status = document.getElementById('status');
        const debug = document.getElementById('debug');
        
        if (Object.keys(currentParams).length === 0) {
            status.innerHTML = '<span class="error">No config loaded. Read first!</span>';
            return;
        }
        
        if (!('NDEFReader' in window)) {
            status.innerHTML = '<span class="error">Web NFC not supported. Use Chrome on Android.</span>';
            return;
        }

        try {
            status.innerHTML = '<span class="info">Hold phone to lamp NFC (should be UNPLUGGED)...</span>';
            
            // Modify only FIX_OUTPUT and Brightness Fix in t02 params
            const newFixBrightness = parseInt(document.getElementById('fixBrightness').value) || 100;
            if (!currentParams['02']) currentParams['02'] = {};
            currentParams['02']['0b'] = '00000001';  // FIX_OUTPUT = ENABLED
            currentParams['02']['06'] = newFixBrightness.toString(16).padStart(8, '0');  // Brightness Fix
            
            // Build params string from ALL param types (t01, t02, etc) sorted
            let params = '';
            const types = Object.keys(currentParams).sort();
            for (const type of types) {
                const sortedNums = Object.keys(currentParams[type]).sort();
                for (const num of sortedNums) {
                    params += 't' + type + 'n' + num + 'v' + currentParams[type][num] + 'x';
                }
            }
            
            debug.textContent += '\n--- WRITING ---\n';
            debug.textContent += 'Modified: FIX_OUTPUT=1, Brightness Fix=' + newFixBrightness + '%\n';
            debug.textContent += 'Params length: ' + params.length + ' chars\n';
            
            // Build URL: params come IMMEDIATELY after data=, padding at end
            // URL structure: https://nfc.ledcity.io/?data= (29 chars) + params + x-padding = 860 total
            const urlPrefix = 'https://nfc.ledcity.io/?data=';
            const paddingNeeded = 860 - urlPrefix.length - params.length;
            let url = urlPrefix + params + 'x'.repeat(Math.max(0, paddingNeeded));
            
            // Truncate if somehow too long
            if (url.length > 860) {
                url = url.substring(0, 860);
            }
            
            debug.textContent += 'Final URL length: ' + url.length + ' (must be 860)\n';
            
            if (url.length !== 860) {
                status.innerHTML = '<span class="error">ERROR: URL length is ' + url.length + '</span>';
                return;
            }
            
            const ndef = new NDEFReader();
            await ndef.write({ records: [{ recordType: "url", data: url }] });
            
            debug.textContent += '\n✓ Write complete!\n';
            debug.textContent += 'FIX_OUTPUT = ENABLED\n';
            debug.textContent += 'Brightness Fix = ' + newFixBrightness + '%\n';
            
            status.innerHTML = '<span class="warning">✓ Done! Now PLUG IN the lamp to apply FIX_OUTPUT.</span>';
            
        } catch (error) {
            status.innerHTML = '<span class="error">Error: ' + error.message + '</span>';
        }
    }
    </script>
</body>
</html>
