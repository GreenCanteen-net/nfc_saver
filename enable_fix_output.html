<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enable FIX_OUTPUT – NFC Saver</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f1ea;
            --panel: #fffdf8;
            --text: #1f1a14;
            --muted: #6a5d4d;
            --border: #d8cdbf;
            --accent: #18654b;
            --accent-2: #9c3d1e;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(156, 61, 30, 0.12), transparent 30%),
                radial-gradient(circle at bottom right, rgba(24, 101, 75, 0.08), transparent 35%),
                var(--bg);
            display: grid;
            place-items: start center;
            padding: 24px;
        }

        main {
            width: min(760px, 100%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 18px 50px rgba(31, 26, 20, 0.08);
        }

        .back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            color: var(--muted);
            text-decoration: none;
            margin-bottom: 20px;
            transition: color 120ms ease;
        }
        .back:hover { color: var(--text); }

        .page-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .label {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: white;
            background: var(--accent-2);
        }

        h1 {
            margin: 0;
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            line-height: 1.1;
        }

        .warning-box {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: rgba(156, 61, 30, 0.08);
            border: 1px solid rgba(156, 61, 30, 0.25);
            border-radius: 12px;
            padding: 14px 16px;
            margin: 16px 0 24px;
            color: var(--accent-2);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .settings-section {
            margin-bottom: 24px;
        }

        .settings-section h3 {
            margin: 0 0 12px;
            font-size: 1rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        th {
            background: rgba(31, 26, 20, 0.04);
            padding: 10px 14px;
            text-align: left;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
        }

        tr:last-child td { border-bottom: none; }

        tr.highlight td { background: rgba(156, 61, 30, 0.06); }

        input[type="number"] {
            width: 70px;
            font-size: 0.95rem;
            font-family: inherit;
            padding: 4px 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--panel);
            color: var(--text);
        }

        .preserve-note {
            margin: 12px 0 0;
            font-size: 0.85rem;
            color: var(--muted);
            font-style: italic;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 24px 0;
        }

        button {
            flex: 1 1 auto;
            min-width: 180px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
        }

        button:not(:disabled):hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(31, 26, 20, 0.12);
        }

        button:not(:disabled):active {
            transform: translateY(0);
        }

        #btnRead {
            background: var(--text);
            color: var(--panel);
        }

        #btnWrite {
            background: var(--accent-2);
            color: white;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #status {
            margin: 0;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.95rem;
            min-height: 44px;
            line-height: 1.5;
        }

        #status:not(:empty) {
            background: rgba(31, 26, 20, 0.04);
            border: 1px solid var(--border);
        }

        .success { color: var(--accent); }
        .error   { color: #c0392b; }
        .info    { color: #2563eb; }
        .warning { color: var(--accent-2); }

        #debug {
            text-align: left;
            background: rgba(31, 26, 20, 0.04);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
            font-size: 0.78rem;
            font-family: "Courier New", monospace;
            max-height: 360px;
            overflow: auto;
            color: var(--muted);
            line-height: 1.6;
        }

        #debug:empty { display: none; }
    </style>
</head>
<body>
    <main>
        <a class="back" href="index.html">&#8592; NFC Saver</a>

        <div class="page-header">
            <span class="label">Enable</span>
            <h1>Enable FIX_OUTPUT</h1>
        </div>

        <div class="warning-box">
            ⚠️ <span><b>Warning:</b> This locks the lamp to fixed brightness and disables motion-triggered dimming.</span>
        </div>

        <div class="settings-section">
            <h3>Settings to modify</h3>
            <table>
                <tr><th>Parameter</th><th>New Value</th></tr>
                <tr class="highlight"><td><b>FIX_OUTPUT</b></td><td><b>ENABLED (1)</b></td></tr>
                <tr class="highlight"><td><b>Brightness Fix</b></td><td><input type="number" id="fixBrightness" value="100" min="0" max="100"> %</td></tr>
            </table>
            <p class="preserve-note">All other settings will be preserved from the lamp's current configuration.</p>
        </div>

        <div class="actions">
            <button onclick="readAndPrepare()" id="btnRead">1. Read Current Config</button>
            <button onclick="writeNFC()" id="btnWrite" disabled>2. Write Changes</button>
        </div>

        <p id="status"></p>
        <pre id="debug"></pre>
    </main>

    <script>
    let currentT02Params = {};  // Store only t02 parameters
    
    const PARAM_NAMES = {
        '01': 'Holdtime Main', '02': 'Holdtime Base',
        '03': 'Brightness Main', '04': 'Brightness Base',
        '05': 'Brightness Standby', '06': 'Brightness Fix',
        '07': 'Standby Mode', '09': 'Rise Time',
        '0a': 'Fall Time', '0b': 'FIX_OUTPUT',
        '0c': 'Radar Sensitivity', '11': 'Daylight Control'
    };
    
    async function readAndPrepare() {
        const status = document.getElementById('status');
        const debug = document.getElementById('debug');
        const btnWrite = document.getElementById('btnWrite');
        debug.textContent = '';
        btnWrite.disabled = true;
        currentT02Params = {};
        
        if (!('NDEFReader' in window)) {
            status.innerHTML = '<span class="error">Web NFC not supported. Use Chrome on Android.</span>';
            return;
        }

        try {
            status.innerHTML = '<span class="info">Hold phone to lamp NFC to READ current config...</span>';
            const ndef = new NDEFReader();
            const controller = new AbortController();
            
            await ndef.scan({ signal: controller.signal });
            
            ndef.onreading = event => {
                controller.abort();
                const decoder = new TextDecoder();
                
                for (const record of event.message.records) {
                    if (record.data) {
                        const text = decoder.decode(record.data);
                        debug.textContent = 'Read ' + text.length + ' bytes\n';
                        debug.textContent += 'Domain: ' + (text.includes('ledcity.io') ? 'ledcity.io OK' : text.includes('ledcity.ch') ? 'ledcity.ch BAD' : 'unknown BAD') + '\n\n';
                        
                        // Parse ALL params but only store t02
                        let t01Count = 0;
                        const allMatches = text.matchAll(/t([0-9a-f]{2})n([0-9a-f]{2})v([0-9a-f]{8})x/gi);
                        for (const match of allMatches) {
                            const type = match[1].toLowerCase();
                            const num = match[2].toLowerCase();
                            const val = match[3].toLowerCase();
                            if (type === '01') t01Count++;
                            else if (type === '02') currentT02Params[num] = val;
                        }
                        
                        if (t01Count > 0) {
                            debug.textContent += 'Found ' + t01Count + ' t01 (device info) params (skipped)\n';
                        }
                        
                        // Display t02 params  
                        debug.textContent += '\nCurrent t02 (setting) parameters:\n';
                        for (const num of Object.keys(currentT02Params).sort()) {
                            const val = currentT02Params[num];
                            const intVal = parseInt(val, 16);
                            const name = PARAM_NAMES[num] || ('n' + num);
                            const highlight = (num === '0b' || num === '06') ? ' <<<' : '';
                            debug.textContent += `  ${name} (n${num}): ${val} = ${intVal}${highlight}\n`;
                        }
                        
                        debug.textContent += '\nFound ' + Object.keys(currentT02Params).length + ' t02 parameters.\n';
                        
                        if (currentT02Params['0b']) {
                            const fixVal = parseInt(currentT02Params['0b'], 16);
                            debug.textContent += '\nCurrent FIX_OUTPUT: ' + (fixVal === 0 ? 'DISABLED -> will set to 1' : 'ENABLED') + '\n';
                        }
                        if (currentT02Params['06']) {
                            const fixBright = parseInt(currentT02Params['06'], 16);
                            debug.textContent += 'Current Brightness Fix: ' + fixBright + '%\n';
                            document.getElementById('fixBrightness').value = fixBright;
                        }
                        
                        debug.textContent += '\nReady. UNPLUG lamp, then click "Write Changes".\n';
                        btnWrite.disabled = false;
                        status.innerHTML = '<span class="success">Config read. Now UNPLUG lamp, then click "Write Changes".</span>';
                    }
                }
            };
            
            ndef.onreadingerror = () => {
                status.innerHTML = '<span class="error">Error reading NFC tag</span>';
            };
            
        } catch (error) {
            status.innerHTML = '<span class="error">Error: ' + error.message + '</span>';
        }
    }

    async function writeNFC() {
        const status = document.getElementById('status');
        const debug = document.getElementById('debug');
        
        if (Object.keys(currentT02Params).length === 0) {
            status.innerHTML = '<span class="error">No config loaded. Read first!</span>';
            return;
        }
        
        if (!('NDEFReader' in window)) {
            status.innerHTML = '<span class="error">Web NFC not supported. Use Chrome on Android.</span>';
            return;
        }

        try {
            status.innerHTML = '<span class="info">Hold phone to lamp NFC (should be UNPLUGGED)...</span>';
            
            // Modify only FIX_OUTPUT and Brightness Fix
            const newFixBrightness = parseInt(document.getElementById('fixBrightness').value) || 100;
            currentT02Params['0b'] = '00000001';  // FIX_OUTPUT = ENABLED
            currentT02Params['06'] = newFixBrightness.toString(16).padStart(8, '0');  // Brightness Fix
            
            // Build params string - ONLY t02 params (no t01 device info)
            let params = '';
            const sortedNums = Object.keys(currentT02Params).sort();
            for (const num of sortedNums) {
                params += 't02n' + num + 'v' + currentT02Params[num] + 'x';
            }
            
            debug.textContent += '\n--- WRITING ---\n';
            debug.textContent += 'Writing ONLY t02 params (no t01 device info)\n';
            debug.textContent += 'Modified: FIX_OUTPUT=1, Brightness Fix=' + newFixBrightness + '%\n';
            debug.textContent += 'Total t02 params: ' + sortedNums.length + '\n';
            debug.textContent += 'Params string length: ' + params.length + ' chars\n';
            
            // Show what we're writing
            debug.textContent += '\nParams being written:\n';
            for (const num of sortedNums) {
                const highlight = (num === '0b' || num === '06') ? ' <<< CHANGED' : '';
                debug.textContent += '  t02n' + num + 'v' + currentT02Params[num] + 'x' + highlight + '\n';
            }
            
            // Build URL with MANDATORY 31 x's padding after data=
            // NFC memory blocks 3-4 MUST be "=xxxxxxxxxxxxxxx" + "xxxxxxxxxxxxxxxx"
            // The firmware's check_config_data() validates these bytes exactly!
            // Params go into blocks 5-54 (= positions 60-859 of URL, = 800 bytes)
            // URL: https:// (8) + nfc.ledcity.io/?data= (21) + 31 x's + params + x-padding = 860
            const urlPrefix = 'https://nfc.ledcity.io/?data=';
            const blockPadding = 'x'.repeat(31);  // MUST have 31 x's for blocks 3-4
            const paramArea = 800;  // blocks 5-54 = 50 blocks * 16 bytes
            const trailingPad = 'x'.repeat(Math.max(0, paramArea - params.length));
            let url = urlPrefix + blockPadding + params + trailingPad;
            
            if (url.length > 860) {
                debug.textContent += 'WARNING: Truncating from ' + url.length + ' to 860\n';
                url = url.substring(0, 860);
            }
            
            debug.textContent += 'Final URL length: ' + url.length + ' (must be 860)\n';
            
            // Verify params in URL
            const fixCheck = url.match(/t02n0bv([0-9a-f]{8})x/i);
            if (fixCheck) {
                debug.textContent += 'Verify t02n0b in URL: ' + fixCheck[1] + (fixCheck[1] === '00000001' ? ' ENABLED OK' : ' NOT ENABLED!') + '\n';
            } else {
                debug.textContent += 'ERROR: t02n0b NOT FOUND in URL!\n';
            }
            
            if (url.length !== 860) {
                status.innerHTML = '<span class="error">ERROR: URL length is ' + url.length + '</span>';
                return;
            }
            
            debug.textContent += '\nURL preview: ' + url.substring(0, 100) + '...\n';
            
            const ndef = new NDEFReader();
            await ndef.write({ records: [{ recordType: "url", data: url }] });
            
            debug.textContent += '\nWrite complete!\n';
            debug.textContent += 'FIX_OUTPUT = ENABLED (1)\n';
            debug.textContent += 'Brightness Fix = ' + newFixBrightness + '%\n';
            debug.textContent += '\nNow PLUG IN the lamp and verify with a read.\n';
            
            status.innerHTML = '<span class="warning">Done! Now PLUG IN the lamp to apply FIX_OUTPUT.</span>';
            
        } catch (error) {
            status.innerHTML = '<span class="error">Error: ' + error.message + '</span>';
            debug.textContent += '\nERROR: ' + error.message + '\n';
        }
    }
    </script>
</body>
</html>
