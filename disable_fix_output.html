<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disable FIX_OUTPUT</title>
    <style>
        :root {
            --primary:    #212c56;
            --accent:     #ffff66;
            --grey-light: #ebebeb;
            --grey-mid:   #909090;
            --grey-dark:  #5b5b5b;
            --white:      #ffffff;
            --black:      #000000;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: var(--grey-light);
            color: var(--black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background: var(--primary);
            color: var(--white);
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 56px;
        }

        header a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.85rem;
        }

        header a:hover { text-decoration: underline; }

        header h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 700;
        }

        main {
            width: min(720px, 100%);
            padding: 32px 24px 48px;
        }

        .info-box {
            background: var(--white);
            color: var(--primary);
            border-left: 5px solid var(--primary);
            border-radius: 2px;
            padding: 12px 16px;
            margin-bottom: 24px;
            font-size: 0.95rem;
        }

        h3 {
            margin: 0 0 12px;
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 12px;
            background: var(--white);
            border: 1px solid var(--grey-mid);
            border-radius: 2px;
            overflow: hidden;
        }

        th {
            background: var(--primary);
            color: var(--white);
            padding: 10px 14px;
            text-align: left;
            font-size: 0.875rem;
            font-weight: 700;
            letter-spacing: 0.03em;
        }

        td {
            padding: 10px 14px;
            font-size: 0.9rem;
            border-top: 1px solid var(--grey-light);
        }

        tr.changed {
            background: var(--grey-light);
        }

        tr.changed td { font-weight: 700; }

        .hint {
            color: var(--grey-dark);
            font-size: 0.875rem;
            margin: 0 0 24px;
            font-style: italic;
        }

        .actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        button {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1rem;
            font-weight: 700;
            padding: 14px 28px;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            transition: opacity 120ms ease, box-shadow 120ms ease;
        }

        button:not(:disabled):hover { opacity: 0.88; box-shadow: 0 4px 12px rgba(33,44,86,0.2); }

        #btnAction {
            background: var(--grey-mid);
            color: var(--white);
        }

        button:disabled {
            background: var(--grey-light);
            color: var(--grey-mid);
            cursor: not-allowed;
        }

        #status {
            font-size: 1rem;
            min-height: 1.5em;
            margin-bottom: 16px;
        }

        .success { color: #1a6e2e; font-weight: 700; }
        .error   { color: #b91c1c; font-weight: 700; }
        .info    { color: var(--primary); font-weight: 700; }

        #debug {
            text-align: left;
            background: var(--primary);
            color: #c8d4f0;
            padding: 14px 16px;
            font-size: 0.8rem;
            line-height: 1.55;
            max-height: 360px;
            overflow-y: auto;
            border-radius: 2px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html">← Back</a>
        <h1>Disable FIX_OUTPUT</h1>
    </header>

    <main>
        <div class="info-box">Restore normal lamp operation (motion detection enabled).</div>

        <h3>Settings to modify</h3>
        <table>
            <tr><th>Parameter</th><th>New Value</th></tr>
            <tr class="changed"><td><b>FIX_OUTPUT</b></td><td><b>DISABLED (0)</b></td></tr>
        </table>
        <p class="hint">Core settings are preserved from the lamp. Firmware restores additional params on boot.</p>

        <div class="actions">
            <button onclick="readAndWrite()" id="btnAction" aria-label="Read NFC configuration and apply changes to lamp">Apply Changes</button>
        </div>

        <p id="status"></p>
        <pre id="debug"></pre>
    </main>

    <script>
    // Only write the 12 known-safe params (1-2 byte unsigned values).
    // The firmware adds any missing NFC params via Parameter_store_nfc() on boot.
    // Signed params (X/Y/Z_POSITION) and 4-byte params (GROUP_0-3) are excluded
    // because their 4-byte NFC representation can cause sign-extension issues
    // in the firmware's get_signed_value() / check_and_set() functions.
    const SAFE_PARAMS = {
        '01': { name: 'Holdtime Main',     defaultVal: '0000000f' },
        '02': { name: 'Holdtime Base',     defaultVal: '0000001e' },
        '03': { name: 'Brightness Main',   defaultVal: '00000032' },
        '04': { name: 'Brightness Base',   defaultVal: '0000000a' },
        '05': { name: 'Brightness Standby',defaultVal: '00000000' },
        '06': { name: 'Brightness Fix',    defaultVal: '00000064' },
        '07': { name: 'Standby Mode',      defaultVal: '00000000' },
        '09': { name: 'Rise Time',         defaultVal: '00000005' },
        '0a': { name: 'Fall Time',         defaultVal: '0000000a' },
        '0b': { name: 'FIX_OUTPUT',        defaultVal: '00000000' },
        '0c': { name: 'Radar Sensitivity', defaultVal: '00000050' },
        '11': { name: 'Daylight Control',  defaultVal: '00000000' }
    };
    
    let currentParams = {};
    
    async function readAndWrite() {
        const status = document.getElementById('status');
        const debug = document.getElementById('debug');
        const btnAction = document.getElementById('btnAction');
        debug.textContent = '';
        currentParams = {};
        btnAction.disabled = true;

        if (!('NDEFReader' in window)) {
            status.innerHTML = '<span class="error">Web NFC not supported. Use Chrome on Android.</span>';
            btnAction.disabled = false;
            return;
        }

        try {
            status.innerHTML = '<span class="info">Hold phone to lamp NFC and keep still...</span>';
            const ndef = new NDEFReader();
            const controller = new AbortController();

            await ndef.scan({ signal: controller.signal });

            ndef.onreading = async event => {
                controller.abort();
                const decoder = new TextDecoder();
                try {
                for (const record of event.message.records) {
                    if (record.data) {
                        const text = decoder.decode(record.data);
                        debug.textContent = 'Read ' + text.length + ' bytes\n';
                        debug.textContent += 'Domain: ' + (text.includes('ledcity.io') ? 'ledcity.io OK' : 'UNKNOWN') + '\n\n';

                        // Parse all params from NFC
                        const allParams = {};
                        let totalFound = 0;
                        const allMatches = text.matchAll(/t([0-9a-f]{2})n([0-9a-f]{2})v([0-9a-f]{8})x/gi);
                        for (const match of allMatches) {
                            const type = match[1].toLowerCase();
                            const num = match[2].toLowerCase();
                            const val = match[3].toLowerCase();
                            allParams[type + '_' + num] = val;
                            totalFound++;
                        }

                        debug.textContent += 'Total params on NFC: ' + totalFound + '\n\n';

                        // Extract only the 12 safe params
                        debug.textContent += 'Core params (will be written back):\n';
                        for (const num of Object.keys(SAFE_PARAMS).sort()) {
                            const key = '02_' + num;
                            const info = SAFE_PARAMS[num];
                            if (allParams[key]) {
                                currentParams[num] = allParams[key];
                                const intVal = parseInt(allParams[key], 16);
                                const highlight = (num === '0b') ? ' <<<' : '';
                                debug.textContent += '  ' + info.name + ' (n' + num + '): ' + allParams[key] + ' = ' + intVal + highlight + '\n';
                            } else {
                                currentParams[num] = info.defaultVal;
                                debug.textContent += '  ' + info.name + ' (n' + num + '): NOT FOUND, default ' + info.defaultVal + '\n';
                            }
                        }

                        // Show skipped params
                        const skippedNums = Object.keys(allParams)
                            .filter(k => k.startsWith('02_') && !SAFE_PARAMS[k.substring(3)])
                            .map(k => k.substring(3));
                        if (skippedNums.length > 0) {
                            debug.textContent += '\nSkipped params (firmware restores on boot): ' + skippedNums.join(', ') + '\n';
                        }

                        debug.textContent += '\nUsing ' + Object.keys(currentParams).length + ' safe params.\n';

                        const fixVal = parseInt(currentParams['0b'], 16);
                        debug.textContent += 'Current FIX_OUTPUT: ' + (fixVal === 0 ? 'DISABLED' : 'ENABLED -> will set to 0') + '\n';

                        // Write back immediately after reading
                        try {
                            status.innerHTML = '<span class="info">Config read. Writing changes, keep phone on NFC...</span>';

                            // Modify only FIX_OUTPUT
                            currentParams['0b'] = '00000000';  // FIX_OUTPUT = DISABLED

                            // Build params string - only 12 safe params in sorted order
                            let params = '';
                            const sortedNums = Object.keys(currentParams).sort();
                            for (const num of sortedNums) {
                                params += 't02n' + num + 'v' + currentParams[num] + 'x';
                            }

                            debug.textContent += '\n--- WRITING ---\n';
                            debug.textContent += 'Modified: FIX_OUTPUT=0 (DISABLED)\n';
                            debug.textContent += 'Total params: ' + sortedNums.length + '\n';
                            debug.textContent += 'Params string length: ' + params.length + ' chars\n';

                            // Show what we're writing
                            debug.textContent += '\nParams being written:\n';
                            for (const num of sortedNums) {
                                const highlight = (num === '0b') ? ' <<< CHANGED' : '';
                                debug.textContent += '  t02n' + num + 'v' + currentParams[num] + 'x' + highlight + '\n';
                            }

                            // Build URL with MANDATORY 31 x's padding after data=
                            const urlPrefix = 'https://nfc.ledcity.io/?data=';
                            const blockPadding = 'x'.repeat(31);  // blocks 3-4 validation
                            const paramArea = 800;  // blocks 5-54 = 50 blocks * 16 bytes
                            const trailingPad = 'x'.repeat(paramArea - params.length);
                            const url = urlPrefix + blockPadding + params + trailingPad;

                            debug.textContent += '\nFinal URL length: ' + url.length + ' (must be 860)\n';

                            // Verify FIX_OUTPUT is in the URL
                            const fixCheck = url.match(/t02n0bv([0-9a-f]{8})x/i);
                            if (fixCheck) {
                                debug.textContent += 'Verify t02n0b in URL: ' + fixCheck[1] + (fixCheck[1] === '00000000' ? ' DISABLED OK' : ' NOT DISABLED!') + '\n';
                            } else {
                                debug.textContent += 'ERROR: t02n0b NOT FOUND in URL!\n';
                            }

                            if (url.length !== 860) {
                                status.innerHTML = '<span class="error">ERROR: URL length is ' + url.length + ', expected 860</span>';
                                return;
                            }

                            debug.textContent += '\nURL preview: ' + url.substring(0, 80) + '...\n';

                            const writer = new NDEFReader();
                            await writer.write({ records: [{ recordType: "url", data: url }] });

                            debug.textContent += '\nWrite complete!\n';
                            debug.textContent += 'FIX_OUTPUT = DISABLED (0)\n';
                            debug.textContent += '\nNow PLUG IN the lamp and verify with a read.\n';

                            status.innerHTML = '<span class="success">Done! Now PLUG IN the lamp for normal operation.</span>';

                        } catch (writeError) {
                            status.innerHTML = '<span class="error">Write error: ' + writeError.message + '</span>';
                            debug.textContent += '\nWRITE ERROR: ' + writeError.message + '\n';
                        }
                    }
                }
                } catch (readError) {
                    status.innerHTML = '<span class="error">Error: ' + readError.message + '</span>';
                    debug.textContent += '\nERROR: ' + readError.message + '\n';
                } finally {
                    btnAction.disabled = false;
                }
            };

            ndef.onreadingerror = () => {
                status.innerHTML = '<span class="error">Error reading NFC tag</span>';
                btnAction.disabled = false;
            };

        } catch (error) {
            status.innerHTML = '<span class="error">Error: ' + error.message + '</span>';
            btnAction.disabled = false;
        }
    }
    </script>
</body>
</html>
