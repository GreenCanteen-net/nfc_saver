<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disable FIX_OUTPUT</title>
    <style>
        body { font-family: Arial; padding: 20px; text-align: center; }
        button { font-size: 24px; padding: 20px 40px; margin: 20px; background: #00aa00; color: white; border: none; border-radius: 10px; }
        button:disabled { background: #ccc; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        table { margin: 20px auto; border-collapse: collapse; }
        td, th { border: 1px solid #ccc; padding: 8px; text-align: left; }
    </style>
</head>
<body>
    <h1>Disable FIX_OUTPUT</h1>
    <p>Restore normal lamp operation (motion detection enabled)</p>
    
    <h3>Settings to modify:</h3>
    <table>
        <tr><th>Parameter</th><th>New Value</th></tr>
        <tr style="background:#e0ffe0"><td><b>FIX_OUTPUT</b></td><td><b>DISABLED (0)</b></td></tr>
    </table>
    <p><i>All other settings will be preserved from the lamp's current configuration.</i></p>
    
    <button onclick="readAndPrepare()" id="btnRead">1. Read Current Config</button>
    <button onclick="writeNFC()" id="btnWrite" disabled>2. Write Changes</button>
    
    <p id="status"></p>
    <pre id="debug" style="text-align:left; background:#f0f0f0; padding:10px; margin:20px; font-size:11px; max-height:400px; overflow:auto;"></pre>

    <script>
    let currentT02Params = {};  // Store only t02 parameters
    
    const PARAM_NAMES = {
        '01': 'Holdtime Main', '02': 'Holdtime Base',
        '03': 'Brightness Main', '04': 'Brightness Base',
        '05': 'Brightness Standby', '06': 'Brightness Fix',
        '07': 'Standby Mode', '09': 'Rise Time',
        '0a': 'Fall Time', '0b': 'FIX_OUTPUT',
        '0c': 'Radar Sensitivity', '11': 'Daylight Control'
    };
    
    async function readAndPrepare() {
        const status = document.getElementById('status');
        const debug = document.getElementById('debug');
        const btnWrite = document.getElementById('btnWrite');
        debug.textContent = '';
        btnWrite.disabled = true;
        currentT02Params = {};
        
        if (!('NDEFReader' in window)) {
            status.innerHTML = '<span class="error">Web NFC not supported. Use Chrome on Android.</span>';
            return;
        }

        try {
            status.innerHTML = '<span class="info">Hold phone to lamp NFC to READ current config...</span>';
            const ndef = new NDEFReader();
            const controller = new AbortController();
            
            await ndef.scan({ signal: controller.signal });
            
            ndef.onreading = event => {
                controller.abort();
                const decoder = new TextDecoder();
                
                for (const record of event.message.records) {
                    if (record.data) {
                        const text = decoder.decode(record.data);
                        debug.textContent = 'Read ' + text.length + ' bytes\n';
                        debug.textContent += 'Domain: ' + (text.includes('ledcity.io') ? 'ledcity.io OK' : text.includes('ledcity.ch') ? 'ledcity.ch BAD' : 'unknown BAD') + '\n\n';
                        
                        // Parse ALL params but only store t02
                        let t01Count = 0;
                        const allMatches = text.matchAll(/t([0-9a-f]{2})n([0-9a-f]{2})v([0-9a-f]{8})x/gi);
                        for (const match of allMatches) {
                            const type = match[1].toLowerCase();
                            const num = match[2].toLowerCase();
                            const val = match[3].toLowerCase();
                            if (type === '01') t01Count++;
                            else if (type === '02') currentT02Params[num] = val;
                        }
                        
                        if (t01Count > 0) {
                            debug.textContent += 'Found ' + t01Count + ' t01 (device info) params (skipped)\n';
                        }
                        
                        // Display t02 params  
                        debug.textContent += '\nCurrent t02 (setting) parameters:\n';
                        for (const num of Object.keys(currentT02Params).sort()) {
                            const val = currentT02Params[num];
                            const intVal = parseInt(val, 16);
                            const name = PARAM_NAMES[num] || ('n' + num);
                            const highlight = (num === '0b') ? ' <<<' : '';
                            debug.textContent += `  ${name} (n${num}): ${val} = ${intVal}${highlight}\n`;
                        }
                        
                        debug.textContent += '\nFound ' + Object.keys(currentT02Params).length + ' t02 parameters.\n';
                        
                        if (currentT02Params['0b']) {
                            const fixVal = parseInt(currentT02Params['0b'], 16);
                            debug.textContent += '\nCurrent FIX_OUTPUT: ' + (fixVal === 0 ? 'DISABLED' : 'ENABLED -> will set to 0') + '\n';
                        } else {
                            debug.textContent += '\nWARNING: FIX_OUTPUT (n0b) not found!\n';
                        }
                        
                        debug.textContent += '\nReady. UNPLUG lamp, then click "Write Changes".\n';
                        btnWrite.disabled = false;
                        status.innerHTML = '<span class="success">Config read. Now UNPLUG lamp, then click "Write Changes".</span>';
                    }
                }
            };
            
            ndef.onreadingerror = () => {
                status.innerHTML = '<span class="error">Error reading NFC tag</span>';
            };
            
        } catch (error) {
            status.innerHTML = '<span class="error">Error: ' + error.message + '</span>';
        }
    }

    async function writeNFC() {
        const status = document.getElementById('status');
        const debug = document.getElementById('debug');
        
        if (Object.keys(currentT02Params).length === 0) {
            status.innerHTML = '<span class="error">No config loaded. Read first!</span>';
            return;
        }
        
        if (!('NDEFReader' in window)) {
            status.innerHTML = '<span class="error">Web NFC not supported. Use Chrome on Android.</span>';
            return;
        }

        try {
            status.innerHTML = '<span class="info">Hold phone to lamp NFC (should be UNPLUGGED)...</span>';
            
            // Modify only FIX_OUTPUT
            currentT02Params['0b'] = '00000000';  // FIX_OUTPUT = DISABLED
            
            // Build params string - ONLY t02 params (no t01 device info)
            let params = '';
            const sortedNums = Object.keys(currentT02Params).sort();
            for (const num of sortedNums) {
                params += 't02n' + num + 'v' + currentT02Params[num] + 'x';
            }
            
            debug.textContent += '\n--- WRITING ---\n';
            debug.textContent += 'Writing ONLY t02 params (no t01 device info)\n';
            debug.textContent += 'Modified: FIX_OUTPUT=0 (DISABLED)\n';
            debug.textContent += 'Total t02 params: ' + sortedNums.length + '\n';
            debug.textContent += 'Params string length: ' + params.length + ' chars\n';
            
            // Show what we're writing
            debug.textContent += '\nParams being written:\n';
            for (const num of sortedNums) {
                const highlight = (num === '0b') ? ' <<< CHANGED' : '';
                debug.textContent += '  t02n' + num + 'v' + currentT02Params[num] + 'x' + highlight + '\n';
            }
            
            // Build URL with MANDATORY 31 x's padding after data=
            // NFC memory blocks 3-4 MUST be "=xxxxxxxxxxxxxxx" + "xxxxxxxxxxxxxxxx"
            // The firmware's check_config_data() validates these bytes exactly!
            // Params go into blocks 5-54 (= positions 60-859 of URL, = 800 bytes)
            // URL: https:// (8) + nfc.ledcity.io/?data= (21) + 31 x's + params + x-padding = 860
            const urlPrefix = 'https://nfc.ledcity.io/?data=';
            const blockPadding = 'x'.repeat(31);  // MUST have 31 x's for blocks 3-4
            const paramArea = 800;  // blocks 5-54 = 50 blocks * 16 bytes
            const trailingPad = 'x'.repeat(Math.max(0, paramArea - params.length));
            let url = urlPrefix + blockPadding + params + trailingPad;
            
            if (url.length > 860) {
                debug.textContent += 'WARNING: Truncating from ' + url.length + ' to 860\n';
                url = url.substring(0, 860);
            }
            
            debug.textContent += 'Final URL length: ' + url.length + ' (must be 860)\n';
            
            // Verify FIX_OUTPUT is in the URL
            const fixCheck = url.match(/t02n0bv([0-9a-f]{8})x/i);
            if (fixCheck) {
                debug.textContent += 'Verify t02n0b in URL: ' + fixCheck[1] + (fixCheck[1] === '00000000' ? ' DISABLED OK' : ' NOT DISABLED!') + '\n';
            } else {
                debug.textContent += 'ERROR: t02n0b NOT FOUND in URL!\n';
            }
            
            if (url.length !== 860) {
                status.innerHTML = '<span class="error">ERROR: URL length is ' + url.length + '</span>';
                return;
            }
            
            debug.textContent += '\nURL preview: ' + url.substring(0, 100) + '...\n';
            
            const ndef = new NDEFReader();
            await ndef.write({ records: [{ recordType: "url", data: url }] });
            
            debug.textContent += '\nWrite complete!\n';
            debug.textContent += 'FIX_OUTPUT = DISABLED (0)\n';
            debug.textContent += '\nNow PLUG IN the lamp and verify with a read.\n';
            
            status.innerHTML = '<span class="success">Done! Now PLUG IN the lamp for normal operation.</span>';
            
        } catch (error) {
            status.innerHTML = '<span class="error">Error: ' + error.message + '</span>';
            debug.textContent += '\nERROR: ' + error.message + '\n';
        }
    }
    </script>
</body>
</html>
